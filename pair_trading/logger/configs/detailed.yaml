version: 1
disable_existing_loggers: false

formatters:
  default:
    format: "%(asctime)s.%(msecs)03d | %(levelname)-8s | %(name)s |%(message)s"
    datefmt: "%H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    formatter: default
    level: INFO

root:
  level: INFO
  handlers: [console]
